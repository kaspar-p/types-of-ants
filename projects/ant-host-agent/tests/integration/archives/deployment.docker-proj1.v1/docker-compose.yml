name: types-of-ants
services:
  ant-gateway:
    build:
      context: /Users/kasparpoland/Desktop/Developing/types-of-ants/projects/ant-gateway
      dockerfile: Dockerfile
      tags:
        - ant-gateway:latest
        - ant-gateway:464-2025-10-26-19-48-55517e3
    container_name: ant-gateway
    environment:
      ANT_GATEWAY_FQDN: beta.typesofants.org
      ANT_ON_THE_WEB_PORT: "3231"
      ANT_ON_THE_WEB_WORKER_NUM: "002"
      VERSION: 464-2025-10-26-19-48-55517e3
    image: ant-gateway:464-2025-10-26-19-48-55517e3
    networks:
      default: null
    ports:
      - mode: ingress
        target: 80
        published: "80"
        protocol: tcp
      - mode: ingress
        target: 443
        published: "443"
        protocol: tcp
    restart: always
    secrets:
      - source: tls_cert
        target: /run/secrets/tls_cert
      - source: tls_cert_key
        target: /run/secrets/tls_cert_key
networks:
  default:
    name: types-of-ants_default
secrets:
  tls_cert:
    name: types-of-ants_tls_cert
    file: /home/ant/service/ant-gateway/464-2025-10-26-19-48-55517e3/secrets/tls_cert.pem
  tls_cert_key:
    name: types-of-ants_tls_cert_key
    file: /home/ant/service/ant-gateway/464-2025-10-26-19-48-55517e3/secrets/tls_key.pem
