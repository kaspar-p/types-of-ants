modules:
  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_status_codes: [200]
      fail_if_not_ssl: true
      preferred_ip_protocol: ip4

  http_2xx_no_tls:
    prober: http
    timeout: 10s
    http:
      valid_status_codes: [200]
      preferred_ip_protocol: ip4

  tcp_connect:
    prober: tcp
    timeout: 5s
